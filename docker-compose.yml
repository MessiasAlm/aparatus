version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: aparatus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aparatus
      POSTGRES_PASSWORD: aparatus_pass
      POSTGRES_DB: aparatus_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
    driver: local
